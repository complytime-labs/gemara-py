version: "3"

vars:
  SPECVERSIONS: v1.0.0 v1.2.0 v1.3.0

tasks:
  generate:
    desc: Generate Pydantic models from Gemara CUE schemas
    cmds:
      - for: { var: SPECVERSIONS }
        cmd: uv run python3 generate.py {{.ITEM}}

  test:
    desc: Run tests
    cmd: uv run pytest tests/ -v

  lint:
    desc: Run linter
    cmd: uv run ruff check .

  format:
    desc: Format code
    cmd: uv run ruff format .
