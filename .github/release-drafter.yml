name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
  - title: "Features"
    labels:
      - "feature"
  - title: "Bug Fixes"
    labels:
      - "bug"
  - title: "Documentation"
    labels:
      - "documentation"
  - title: "Maintenance"
    labels:
      - "maintenance"
      - "refactor"
  - title: "Testing"
    labels:
      - "testing"

change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - "breaking"
  minor:
    labels:
      - "feature"
  patch:
    labels:
      - "bug"
      - "maintenance"
      - "refactor"
      - "documentation"
      - "testing"
  default: patch

autolabeler:
  - label: "feature"
    title:
      - "/^feat:/i"
      - "/^feat\\(/i"
  - label: "bug"
    title:
      - "/^fix:/i"
      - "/^fix\\(/i"
  - label: "documentation"
    title:
      - "/^docs:/i"
      - "/^docs\\(/i"
  - label: "testing"
    title:
      - "/^test:/i"
      - "/^test\\(/i"
  - label: "refactor"
    title:
      - "/^refactor:/i"
      - "/^refactor\\(/i"
  - label: "maintenance"
    title:
      - "/^chore:/i"
      - "/^chore\\(/i"
      - "/^build:/i"
      - "/^build\\(/i"
      - "/^ci:/i"
      - "/^ci\\(/i"

template: |
  ## Changes

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
